specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Xero
providerId: xero
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Accounting
  - Finance
  - Small Business
  - Payroll
  - Invoicing
description: Xero is a tiered SMB accounting SaaS sold as monthly subscriptions per organisation
  (region-specific tiers in US, UK, AU, NZ, etc.). API access is included with the underlying
  organisation subscription rather than priced separately. Pricing pages are public but were
  unreachable from this reconciliation environment (timeouts / 503), so plan tier names and
  per-month prices have not been refreshed in this artifact.
sources:
  - https://www.xero.com/us/pricing-plans/
  - https://developer.xero.com/
notes: WebFetch attempts against xero.com pricing pages timed out / returned 503 during
  reconciliation. Trimmed to a single Contact / See Pricing Page plan rather than copy invented
  tier prices. Refresh once xero.com pages are reachable.
plans:
  - id: xero-see-pricing-page
    name: See Xero Pricing Page
    type: subscription
    description: Xero is sold as monthly per-organisation subscriptions in tiers that vary by
      region (e.g. US Early / Growing / Established; AU Starter / Standard / Premium / Ultimate;
      analogous tiers in UK, NZ, CA, etc.). API access is bundled with the organisation
      subscription. Refer to xero.com/{region}/pricing-plans/ for current monthly prices.
    entries:
      - label: Per organisation / month
        name: per_org_month
        type: subscription
        metric: organisation
        limit: -1
        timeFrame: month
        geo: regional
        unit: 1
        price: see https://www.xero.com/us/pricing-plans/
        userMultiplied: false
    elements:
      - name: Xero Accounting API
      - name: Xero Assets API
      - name: Xero Bank Feeds API
      - name: Xero Finance API
      - name: Xero Identity API
      - name: Xero Payroll Australia API
      - name: Xero Payroll New Zealand API
      - name: Xero Payroll United Kingdom API
      - name: Xero Projects API
      - name: Xero Files API
maintainers:
