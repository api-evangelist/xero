specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Xero
providerId: xero
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Accounting
  - Finance
  - SaaS
description: 'FOCUS-aligned FinOps for Xero: per-organisation tiered SaaS subscription with no
  per-API meter; spend is driven by organisation count and plan tier per region.'
sources:
  - https://www.xero.com/us/pricing-plans/
  - https://developer.xero.com/
notes: Pricing pages were unreachable (503/timeout) during reconciliation; tier names and
  prices have not been refreshed. Meters reflect the per-organisation subscription billing
  surface rather than per-API usage.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Xero Limited
serviceCategory: Accounting / SMB SaaS
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Monthly
  billingCurrency: USD/EUR/GBP/AUD/NZD/CAD (region-specific)
  chargeCategories:
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Xero
  ServiceCategory: Accounting / SMB SaaS
  ProviderName: Xero
  PublisherName: Xero Limited
  InvoiceIssuerName: Xero Limited
  BillingCurrency: USD/EUR/GBP/AUD/NZD/CAD
meters:
  - name: organisation_subscription
    unit: month
    aggregation: sum
    dimensions:
      - region
      - plan
      - organisation
  - name: payroll_employees
    unit: employee
    aggregation: max
    dimensions:
      - region
      - organisation
principles:
  - name: Visibility
    description: Spend is visible per organisation in the Xero account billing area; API
      consumption itself is not metered or billed, so no separate FOCUS export exists for API
      usage.
  - name: Allocation
    description: Allocate by organisation and region; integration partners reselling Xero seats
      typically allocate via their partner billing rather than direct Xero invoices.
  - name: Optimization
    description: Levers are right-sizing the organisation tier (e.g. dropping from Established
      to Growing if features go unused), pruning inactive organisations, and consolidating
      payroll subscriptions per region.
  - name: Accountability
    description: Finance owns the Xero subscription; integration teams own the OAuth app and
      tenant authorisations that consume the API at no separate cost.
maintainers:
