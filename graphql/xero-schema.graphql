  createManualJournal(input: ManualJournalInput!): ManualJournal
  updateManualJournal(manualJournalID: UUID!, input: ManualJournalInput!): ManualJournal
  deleteManualJournal(manualJournalID: UUID!): Boolean

  # Overpayments
