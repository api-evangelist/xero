"""
Conceptual GraphQL schema for the Xero Accounting Platform.
Derived from the Xero REST API surface (Accounting, Assets, Bank Feeds,
Finance, Identity, Payroll, Projects, Files APIs).
This is NOT an officially published Xero schema — it is a reference artifact
mapping Xero's documented resource types and relationships into GraphQL SDL.
Source: https://developer.xero.com/documentation/
"""

