  deleteAllocationOnOverpayment(overpaymentID: UUID!, allocationID: UUID!): Boolean

  # Payments
  createPayment(input: PaymentInput!): Payment
  updatePayment(paymentID: UUID!, status: PaymentStatus!): Payment
  deletePayment(paymentID: UUID!): Boolean

  # Prepayments
  createAllocationOnPrepayment(prepaymentID: UUID!, input: AllocationInput!): Prepayment
  deleteAllocationOnPrepayment(prepaymentID: UUID!, allocationID: UUID!): Boolean

  # Purchase Orders
  createPurchaseOrder(input: PurchaseOrderInput!): PurchaseOrder
  updatePurchaseOrder(purchaseOrderID: UUID!, input: PurchaseOrderInput!): PurchaseOrder
  deletePurchaseOrder(purchaseOrderID: UUID!): Boolean
  emailPurchaseOrder(purchaseOrderID: UUID!, to: String, subject: String, message: String): Boolean

  # Quotes
  createQuote(input: QuoteInput!): Quote
  updateQuote(quoteID: UUID!, input: QuoteInput!): Quote
  deleteQuote(quoteID: UUID!): Boolean

  # Receipts
  createReceipt(input: ReceiptInput!): Receipt
  updateReceipt(receiptID: UUID!, input: ReceiptInput!): Receipt

  # Repeating Invoices
  updateRepeatingInvoice(repeatingInvoiceID: UUID!, status: RepeatingInvoiceStatus!): RepeatingInvoice

  # Tax Rates
  createTaxRate(input: TaxRateInput!): TaxRate
  updateTaxRate(taxType: TaxType!, input: TaxRateInput!): TaxRate

  # Tracking Categories
  createTrackingCategory(name: String!): TrackingCategory
  updateTrackingCategory(trackingCategoryID: UUID!, name: String, status: String): TrackingCategory
  deleteTrackingCategory(trackingCategoryID: UUID!): Boolean
  createTrackingOption(trackingCategoryID: UUID!, name: String!): TrackingOption
  updateTrackingOption(trackingCategoryID: UUID!, trackingOptionID: UUID!, name: String, status: String): TrackingOption
  deleteTrackingOption(trackingCategoryID: UUID!, trackingOptionID: UUID!): Boolean

  # Assets
  createAsset(input: AssetInput!): Asset
  updateAsset(assetId: UUID!, input: AssetInput!): Asset
  createAssetType(input: AssetTypeInput!): AssetType
  updateAssetType(assetTypeId: UUID!, input: AssetTypeInput!): AssetType
  updateAssetSettings(input: AssetSettingInput!): AssetSetting

  # Bank Feeds
  createFeedConnections(input: [FeedConnectionInput!]!): [FeedConnection]
  deleteFeedConnection(id: UUID!): Boolean
  createStatements(input: [StatementInput!]!): [Statement]

  # Projects
  createProject(input: ProjectInput!): Project
  updateProject(projectId: UUID!, input: ProjectInput!): Project
  closeProject(projectId: UUID!): Project
  patchProject(projectId: UUID!, status: ProjectStatus): Project
  createTask(projectId: UUID!, input: TaskInput!): Task
  updateTask(projectId: UUID!, taskId: UUID!, input: TaskInput!): Task
  deleteTask(projectId: UUID!, taskId: UUID!): Boolean
  createTimeEntry(projectId: UUID!, input: TimeEntryInput!): TimeEntry
  updateTimeEntry(projectId: UUID!, timeEntryId: UUID!, input: TimeEntryInput!): TimeEntry
  deleteTimeEntry(projectId: UUID!, timeEntryId: UUID!): Boolean

  # Files
  uploadFile(folderId: UUID, input: FileInput!): FileObject
  deleteFile(fileId: UUID!): Boolean
  createFolder(name: String!): Folder
  updateFolder(folderId: UUID!, name: String!): Folder
  deleteFolder(folderId: UUID!): Boolean
  createAssociation(input: AssociationInput!): Association
  deleteAssociation(fileId: UUID!, objectId: UUID!, objectGroup: String!): Boolean

  # Identity
  deleteConnection(id: UUID!): Boolean
