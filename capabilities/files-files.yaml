        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: FolderId
          in: path
          type: string
          description: pass required folder id to save file to specific folder
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: Folders
      path: /Folders
      operations:
      - name: getfolders
        method: GET
        description: Retrieves folders
        outputRawFormat: json
        outputParameters:
