      operations:
      - name: getinbox
        method: GET
        description: Retrieves inbox folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.XERO_API_KEY}}'
