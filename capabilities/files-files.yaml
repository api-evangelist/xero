          in: path
          type: string
          description: File id for single object
          required: true
      - name: createfileassociation
        method: POST
        description: Creates a new file association
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: FileId
          in: path
          type: string
          description: File id for single object
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: Files-FileId-Associations-ObjectId
      path: /Files/{FileId}/Associations/{ObjectId}
      operations:
      - name: deletefileassociation
        method: DELETE
        description: Deletes an existing file association
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: FileId
          in: path
          type: string
          description: File id for single object
          required: true
        - name: ObjectId
          in: path
          type: string
          description: Object id for single object
          required: true
    - name: Files-FileId-Content
      path: /Files/{FileId}/Content
