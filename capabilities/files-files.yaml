naftiko: 1.0.0-alpha2
info:
  label: Xero Files API — Files
  description: 'Xero Files API — Files. 18 operations. Lead operation: Retrieves a count of associations for a list of objects..
    Self-contained Naftiko capability covering one Xero business surface.'
  tags:
  - Xero
  - Files
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    XERO_API_KEY: XERO_API_KEY
capability:
  consumes:
  - type: http
    namespace: files-files
    baseUri: https://api.xero.com/files.xro/1.0
    description: Xero Files API — Files business capability. Self-contained, no shared references.
    resources:
    - name: Associations-Count
      path: /Associations/Count
      operations:
      - name: getassociationscount
        method: GET
        description: Retrieves a count of associations for a list of objects.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ObjectIds
          in: query
          type: array
          description: A comma-separated list of object ids
          required: true
    - name: Associations-ObjectId
      path: /Associations/{ObjectId}
      operations:
      - name: getassociationsbyobject
        method: GET
        description: Retrieves an association object using a unique object ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ObjectId
          in: path
          type: string
          description: Object id for single object
          required: true
        - name: pagesize
          in: query
          type: integer
          description: pass an optional page size value
        - name: page
          in: query
          type: integer
          description: number of records to skip for pagination
        - name: sort
          in: query
          type: string
          description: values to sort by
        - name: direction
          in: query
          type: string
          description: direction to sort by
    - name: Files
      path: /Files
      operations:
      - name: getfiles
        method: GET
        description: Retrieves files
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: pagesize
          in: query
          type: integer
          description: pass an optional page size value
        - name: page
          in: query
          type: integer
          description: number of records to skip for pagination
        - name: sort
          in: query
          type: string
          description: values to sort by
        - name: direction
          in: query
          type: string
          description: sort direction
      - name: uploadfile
        method: POST
        description: Uploads a File to the inbox
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: Files-FileId
      path: /Files/{FileId}
      operations:
      - name: getfile
        method: GET
        description: Retrieves a file by a unique file ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: FileId
          in: path
          type: string
          description: File id for single object
          required: true
      - name: updatefile
        method: PUT
        description: Update a file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: FileId
          in: path
          type: string
          description: File id for single object
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletefile
        method: DELETE
        description: Deletes a specific file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: FileId
          in: path
          type: string
          description: File id for single object
