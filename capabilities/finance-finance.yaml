      call: finance-finance.getfinancialstatementcontactsrevenue
      with:
        contactIds: tools.contactIds
        includeManualJournals: tools.includeManualJournals
        startDate: tools.startDate
        endDate: tools.endDate
      outputParameters:
      - type: object
        mapping: $.
